name: Bounty Monitor

on:
  schedule:
    # GitHub cron is UTC. These correspond roughly to 07:00 / 12:00 / 18:00 Budapest in winter time.
    - cron: '0 6 * * *'
    - cron: '0 11 * * *'
    - cron: '0 17 * * *'
  workflow_dispatch:

jobs:
  check-bounties:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore seen state (cache)
        uses: actions/cache@v4
        with:
          path: seen_bounties.json
          key: bounties-state-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            bounties-state-${{ runner.os }}-

      - name: Run monitor
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          MIN_AMOUNT_USD: '50'
        run: python bounty_monitor.py

      - name: Save seen state (cache)
        uses: actions/cache@v4
        with:
          path: seen_bounties.json
          key: bounties-state-${{ runner.os }}-${{ github.run_id }}
